<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="lensCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="60%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0ea5e9" flood-opacity="0.3"/>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Glow background -->
  <circle cx="100" cy="100" r="80" fill="#0ea5e9" fill-opacity="0.05"/>

  <!-- Mount arm -->
  <rect x="92" y="20" width="16" height="50" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="82" y="15" width="36" height="14" rx="5" fill="#334155"/>

  <!-- Camera body -->
  <rect x="40" y="70" width="120" height="50" rx="14" fill="url(#body)" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Lens housing outer -->
  <circle cx="72" cy="95" r="26" fill="#0f172a" stroke="#475569" stroke-width="2"/>
  <!-- Lens rings -->
  <circle cx="72" cy="95" r="22" fill="#0a0f1e" stroke="#1e3a5f" stroke-width="1"/>
  <circle cx="72" cy="95" r="17" fill="url(#lensCore)" opacity="0.9"/>
  <circle cx="72" cy="95" r="11" fill="#0a0f1e"/>
  <circle cx="72" cy="95" r="7" fill="#0ea5e9" opacity="0.8" filter="url(#glow2)"/>
  <circle cx="72" cy="95" r="3" fill="white" opacity="0.9"/>
  <!-- Lens reflection -->
  <circle cx="66" cy="89" r="3" fill="white" opacity="0.25"/>

  <!-- IR LEDs grid -->
  <circle cx="108" cy="80" r="4" fill="#ef4444" opacity="0.8"/>
  <circle cx="122" cy="80" r="4" fill="#ef4444" opacity="0.8"/>
  <circle cx="136" cy="80" r="4" fill="#ef4444" opacity="0.8"/>
  <circle cx="108" cy="95" r="4" fill="#ef4444" opacity="0.8"/>
  <circle cx="122" cy="95" r="4" fill="#ef4444" opacity="0.6"/>
  <circle cx="136" cy="95" r="4" fill="#ef4444" opacity="0.8"/>
  <circle cx="108" cy="110" r="4" fill="#ef4444" opacity="0.8"/>
  <circle cx="122" cy="110" r="4" fill="#ef4444" opacity="0.8"/>
  <circle cx="136" cy="110" r="4" fill="#ef4444" opacity="0.6"/>

  <!-- Status LED -->
  <circle cx="155" cy="78" r="5" fill="#22c55e" filter="url(#glow2)"/>

  <!-- Bottom label -->
  <rect x="55" y="125" width="90" height="18" rx="4" fill="#0f172a"/>
  <text x="100" y="138" text-anchor="middle" font-size="8" fill="#64748b" font-family="monospace" font-weight="bold">CCTV SOLO PRO</text>

  <!-- Scan beam -->
  <path d="M72 95 L20 50 L20 140 Z" fill="#0ea5e9" fill-opacity="0.04"/>
  <path d="M72 95 L20 50" stroke="#0ea5e9" stroke-width="0.5" stroke-opacity="0.2"/>
  <path d="M72 95 L20 140" stroke="#0ea5e9" stroke-width="0.5" stroke-opacity="0.2"/>
</svg>
