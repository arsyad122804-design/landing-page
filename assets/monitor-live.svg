<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="monGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#060d1a"/>
    </linearGradient>
  </defs>

  <!-- Monitor body -->
  <rect x="30" y="20" width="340" height="220" rx="16" fill="url(#monGrad)" stroke="#334155" stroke-width="2"/>
  <!-- Screen bezel -->
  <rect x="44" y="34" width="312" height="192" rx="10" fill="url(#screenGrad)"/>

  <!-- 4-grid camera feeds -->
  <!-- Top-left -->
  <rect x="52" y="42" width="146" height="88" rx="6" fill="#0a1628"/>
  <rect x="52" y="42" width="146" height="88" rx="6" stroke="#1e3a5f" stroke-width="1"/>
  <text x="125" y="92" text-anchor="middle" font-size="28" fill="#0ea5e9" opacity="0.3">🏠</text>
  <text x="62" y="56" font-size="7" fill="#ef4444" font-family="monospace" font-weight="bold">● CAM 01</text>

  <!-- Top-right -->
  <rect x="202" y="42" width="146" height="88" rx="6" fill="#0d1f35"/>
  <rect x="202" y="42" width="146" height="88" rx="6" stroke="#1e3a5f" stroke-width="1"/>
  <text x="275" y="92" text-anchor="middle" font-size="28" fill="#0ea5e9" opacity="0.3">🏢</text>
  <text x="212" y="56" font-size="7" fill="#22c55e" font-family="monospace" font-weight="bold">● CAM 02</text>

  <!-- Bottom-left -->
  <rect x="52" y="134" width="146" height="88" rx="6" fill="#0d1f35"/>
  <rect x="52" y="134" width="146" height="88" rx="6" stroke="#1e3a5f" stroke-width="1"/>
  <text x="125" y="184" text-anchor="middle" font-size="28" fill="#0ea5e9" opacity="0.3">🚗</text>
  <text x="62" y="148" font-size="7" fill="#22c55e" font-family="monospace" font-weight="bold">● CAM 03</text>

  <!-- Bottom-right -->
  <rect x="202" y="134" width="146" height="88" rx="6" fill="#0a1628"/>
  <rect x="202" y="134" width="146" height="88" rx="6" stroke="#1e3a5f" stroke-width="1"/>
  <text x="275" y="184" text-anchor="middle" font-size="28" fill="#0ea5e9" opacity="0.3">🏪</text>
  <text x="212" y="148" font-size="7" fill="#ef4444" font-family="monospace" font-weight="bold">● CAM 04</text>

  <!-- Center divider lines -->
  <line x1="200" y1="42" x2="200" y2="222" stroke="#1e3a5f" stroke-width="2"/>
  <line x1="52" y1="130" x2="348" y2="130" stroke="#1e3a5f" stroke-width="2"/>

  <!-- Status bar -->
  <rect x="44" y="210" width="312" height="16" rx="0" fill="#060d1a"/>
  <rect x="44" y="210" width="312" height="1" fill="#0ea5e9" fill-opacity="0.15"/>
  <circle cx="58" cy="218" r="4" fill="#22c55e"/>
  <text x="68" y="222" font-size="7" fill="#22c55e" font-family="monospace">4 CAMERAS ONLINE</text>
  <text x="300" y="222" font-size="7" fill="#475569" font-family="monospace">REC</text>
  <circle cx="312" cy="218" r="3" fill="#ef4444"/>

  <!-- Monitor stand -->
  <rect x="180" y="240" width="40" height="16" rx="4" fill="#1e293b"/>
  <rect x="155" y="256" width="90" height="10" rx="4" fill="#1e293b"/>

  <!-- Corner HUD brackets -->
  <path d="M52 42 L52 54 M52 42 L64 42" stroke="#0ea5e9" stroke-width="1.5" stroke-opacity="0.6"/>
  <path d="M348 42 L348 54 M348 42 L336 42" stroke="#0ea5e9" stroke-width="1.5" stroke-opacity="0.6"/>
  <path d="M52 226 L52 214 M52 226 L64 226" stroke="#0ea5e9" stroke-width="1.5" stroke-opacity="0.6"/>
  <path d="M348 226 L348 214 M348 226 L336 226" stroke="#0ea5e9" stroke-width="1.5" stroke-opacity="0.6"/>
</svg>
