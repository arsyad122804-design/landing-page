<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" fill="none">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="500" height="300" fill="url(#bg1)"/>

  <!-- Background pattern -->
  <circle cx="380" cy="60" r="120" fill="#0ea5e9" fill-opacity="0.06"/>
  <circle cx="420" cy="200" r="80" fill="#6366f1" fill-opacity="0.06"/>

  <!-- Brand badge -->
  <rect x="20" y="20" width="80" height="28" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="60" y="39" text-anchor="middle" font-family="Inter,sans-serif" font-weight="800" font-size="13" fill="white" letter-spacing="1">alhua</text>

  <!-- Camera image placeholder -->
  <ellipse cx="370" cy="120" rx="90" ry="90" fill="rgba(14,165,233,0.08)"/>
  <!-- Camera body -->
  <rect x="310" y="80" width="110" height="50" rx="12" fill="#334155" stroke="#475569" stroke-width="1.5"/>
  <circle cx="330" cy="105" r="18" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
  <circle cx="330" cy="105" r="12" fill="#0ea5e9" opacity="0.8"/>
  <circle cx="330" cy="105" r="6" fill="#0a0f1e"/>
  <circle cx="330" cy="105" r="3" fill="#38bdf8"/>
  <!-- IR LEDs -->
  <circle cx="360" cy="92" r="3" fill="#ef4444" opacity="0.8"/>
  <circle cx="372" cy="92" r="3" fill="#ef4444" opacity="0.8"/>
  <circle cx="384" cy="92" r="3" fill="#ef4444" opacity="0.8"/>
  <circle cx="360" cy="118" r="3" fill="#ef4444" opacity="0.8"/>
  <circle cx="372" cy="118" r="3" fill="#ef4444" opacity="0.8"/>
  <circle cx="384" cy="118" r="3" fill="#ef4444" opacity="0.8"/>
  <!-- Mount -->
  <rect x="400" y="90" width="24" height="30" rx="4" fill="#475569"/>

  <!-- Title -->
  <text x="20" y="80" font-family="Inter,sans-serif" font-weight="500" font-size="11" fill="rgba(255,255,255,0.5)" letter-spacing="2">PAKET 4 CCTV</text>
  <text x="20" y="118" font-family="Inter,sans-serif" font-weight="900" font-size="42" fill="white" letter-spacing="-2">"JURAGAN"</text>
  <rect x="20" y="128" width="90" height="20" rx="4" fill="url(#accent1)"/>
  <text x="65" y="142" text-anchor="middle" font-family="Inter,sans-serif" font-weight="700" font-size="10" fill="white" letter-spacing="2">SERIES</text>

  <!-- CTA Button -->
  <rect x="20" y="158" width="160" height="36" rx="8" fill="#f59e0b"/>
  <text x="100" y="181" text-anchor="middle" font-family="Inter,sans-serif" font-weight="800" font-size="13" fill="#000" letter-spacing="1">ORDER SEKARANG</text>

  <!-- Specs -->
  <rect x="20" y="205" width="130" height="22" rx="5" fill="rgba(14,165,233,0.15)" stroke="rgba(14,165,233,0.3)" stroke-width="1"/>
  <text x="85" y="220" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#7dd3fc">2MP 1080P Resolution</text>
  <rect x="160" y="205" width="110" height="22" rx="5" fill="rgba(14,165,233,0.15)" stroke="rgba(14,165,233,0.3)" stroke-width="1"/>
  <text x="215" y="220" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#7dd3fc">IP67 Weatherproof</text>

  <rect x="20" y="234" width="130" height="22" rx="5" fill="rgba(14,165,233,0.15)" stroke="rgba(14,165,233,0.3)" stroke-width="1"/>
  <text x="85" y="249" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#7dd3fc">Max. length 15-30m</text>
  <rect x="160" y="234" width="110" height="22" rx="5" fill="rgba(14,165,233,0.15)" stroke="rgba(14,165,233,0.3)" stroke-width="1"/>
  <text x="215" y="249" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#7dd3fc">Plastic Body Cover</text>
</svg>
