  <ellipse cx="390" cy="140" rx="45" ry="55" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Eyes -->
  <ellipse cx="375" cy="130" rx="8" ry="10" fill="url(#glow2)" opacity="0.9"/>
  <ellipse cx="405" cy="130" rx="8" ry="10" fill="url(#glow2)" opacity="0.9"/>
  <circle cx="375" cy="130" r="4" fill="white" opacity="0.9"/>
  <circle cx="405" cy="130" r="4" fill="white" opacity="0.9"/>
  <!-- Mouth line -->
  <path d="M375 158 Q390 165 405 158" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Neck -->
  <rect x="382" y="192" width="16" height="20" rx="4" fill="rgba(255,255,255,0.1)"/>

  <!-- AI Icons floating -->
  <circle cx="310" cy="80" r="22" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text x="310" y="87" text-anchor="middle" font-size="16" fill="white">👁</text>

  <circle cx="460" cy="110" r="22" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text x="460" y="117" text-anchor="middle" font-size="16" fill="white">🤖</text>

  <circle cx="460" cy="200" r="22" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text x="460" y="207" text-anchor="middle" font-size="16" fill="white">📡</text>

  <!-- Text content -->
  <text x="20" y="80" font-family="Inter,sans-serif" font-weight="900" font-size="22" fill="white" letter-spacing="-0.5">MANFAAT</text>
  <text x="20" y="106" font-family="Inter,sans-serif" font-weight="900" font-size="22" fill="white" letter-spacing="-0.5">TEKNOLOGI AI</text>
  <text x="20" y="132" font-family="Inter,sans-serif" font-weight="900" font-size="22" fill="white" letter-spacing="-0.5">PADA CCTV</text>

  <text x="20" y="158" font-family="Inter,sans-serif" font-size="10" fill="rgba(255,255,255,0.75)" letter-spacing="0.2">Produk &amp; Solusi Keamanan</text>
  <text x="20" y="172" font-family="Inter,sans-serif" font-size="10" fill="rgba(255,255,255,0.75)">berbasis AI &amp; Algoritma</text>
  <text x="20" y="186" font-family="Inter,sans-serif" font-size="10" fill="rgba(255,255,255,0.75)">Deep Learning</text>
