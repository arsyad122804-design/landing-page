      <stop offset="0%" stop-color="#0369a1"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <rect width="500" height="300" fill="url(#bg2)"/>

  <!-- Glow circles -->
  <circle cx="350" cy="150" r="160" fill="rgba(255,255,255,0.05)"/>
  <circle cx="420" cy="80" r="80" fill="rgba(255,255,255,0.06)"/>

  <!-- Brand badge -->
  <rect x="20" y="20" width="80" height="28" rx="6" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="60" y="39" text-anchor="middle" font-family="Inter,sans-serif" font-weight="800" font-size="13" fill="white" letter-spacing="1">alhua</text>

  <!-- AI Robot face (simplified) -->
  <ellipse cx="390" cy="180" rx="70" ry="90" fill="rgba(255,255,255,0.08)"/>
